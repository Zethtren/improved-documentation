apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# live-local: minikube mirror of prod.
# Everything matches prod (cloudflared tunnel, houstonbova.com ingress,
# surrealdb-credentials secret, PVC-backed SurrealDB) except images are loaded
# into minikube directly, so locally-built images set imagePullPolicy: Never.

resources:
  - ../prod

patches:
  - path: patches/image-pull-never.yaml
