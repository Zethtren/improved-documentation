apiVersion: apps/v1
kind: Deployment
metadata:
  name: leptos-cv
  namespace: houston-cv
spec:
  template:
    spec:
      containers:
        - name: leptos-cv
          imagePullPolicy: Never
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix-dashboard
  namespace: houston-cv
spec:
  template:
    spec:
      containers:
        - name: phoenix-dashboard
          imagePullPolicy: Never
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: surrealdb
  namespace: houston-cv
spec:
  template:
    spec:
      containers:
        - name: surrealdb
          imagePullPolicy: Never
---
apiVersion: batch/v1
kind: Job
metadata:
  name: surrealdb-init
  namespace: houston-cv
spec:
  template:
    spec:
      containers:
        - name: surrealdb-init
          imagePullPolicy: Never
