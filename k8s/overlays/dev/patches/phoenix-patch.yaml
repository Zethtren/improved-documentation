apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix-dashboard
  namespace: houston-cv
spec:
  template:
    spec:
      containers:
        - name: phoenix-dashboard
          imagePullPolicy: Never
          resources:
            limits:
              memory: "256Mi"
              cpu: "250m"
            requests:
              memory: "256Mi"
              cpu: "250m"
