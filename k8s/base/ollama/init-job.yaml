apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-model-pull
  namespace: houston-cv
  labels:
    app: ollama-init
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: ollama-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-ollama
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for Ollama to be ready..."
              until wget -qO- http://ollama:11434/api/tags >/dev/null 2>&1; do
                echo "  ... not ready, retrying in 3s"
                sleep 3
              done
              echo "Ollama is ready"
      containers:
        - name: ollama-pull
          image: ollama/ollama:latest
          command: ["sh", "-c"]
          args:
            - |
              ollama pull nomic-embed-text && \
              ollama pull llama3.1:8b
          env:
            - name: OLLAMA_HOST
              value: "http://ollama:11434"
