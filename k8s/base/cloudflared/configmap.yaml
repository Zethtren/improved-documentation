apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: houston-cv
  labels:
    app: cloudflared
data:
  config.yaml: |
    # Placeholder base config — the prod overlay replaces this with real
    # tunnel ID and hostnames. Do not rely on base values at runtime.
    tunnel: REPLACE_WITH_TUNNEL_ID
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true
    ingress:
      - hostname: cv.localhost
        service: http://traefik:80
      - hostname: admin.localhost
        service: http://traefik:80
      - hostname: traefik.localhost
        service: http://traefik:80
      - service: http_status:404
