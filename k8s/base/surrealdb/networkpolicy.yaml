apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: surrealdb-allow-apps-only
  namespace: houston-cv
  labels:
    app: surrealdb
spec:
  podSelector:
    matchLabels:
      app: surrealdb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: leptos-cv
        - podSelector:
            matchLabels:
              app: phoenix-dashboard
      ports:
        - protocol: TCP
          port: 8000
